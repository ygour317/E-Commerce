<div class="login-container">

  <h2>
    Login
  </h2>

  <input
    type="email"
    placeholder="Email"
    [(ngModel)]="request.email"
  >

  <input
    type="password"
    placeholder="Password"
    [(ngModel)]="request.password"
  >

  <button
    (click)="login()"
  >
    Login
  </button>

  @if(errorMessage){

  <p class="error">
    {{errorMessage}}
  </p>

  }

  <p>

    New user?

    <a routerLink="/register">
      Register
    </a>

  </p>

</div>
